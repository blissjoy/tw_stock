name: 每日選股 pipeline

# ⚠️ 排程已暫停(2026-07-23)：架構調整為本機優先運作(PySide6桌面版 + Windows工作排程器，
# 見README「本機每日排程」)，這支workflow打的Turso目前帳號寫入額度用完、寫入被封鎖，留著
# 排程只會每天默默失敗。保留workflow_dispatch可以手動觸發，之後恢復雲端部署
# (GitHub Actions + Turso + Streamlit Cloud)時，只需要取消下面schedule的註解即可，
# 不需要改其他程式碼(DB連線邏輯已經是環境變數切換，見src/data/connection.py)。
on:
  # schedule:
  #   # UTC 11:30 週一~五 = 台灣時間 19:30，晚於三大法人/融資融券資料通常齊全的時間點
  #   - cron: "30 11 * * 1-5"
  workflow_dispatch: {}

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    # TPEx透過FinMind逐股抓取(只抓~640檔4碼普通股股價，濾掉ETF/債券/權證，且法人/融資券
    # 目前沒有規則用到、不抓)，實測約1小時內完成；抓取端已在 finmind_client.py 內建
    # 主動節流(_throttle)避免撞到402額度上限。這裡的timeout抓90分鐘當安全margin，
    # 同時也讓「意外卡住」的執行(例如ensure_schema衝突曾經導致process卡住不退出)能在
    # 合理時間內被GitHub Actions強制中止，而不是無意義地占用6小時。
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
        run: python scripts/daily_pipeline.py
